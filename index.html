<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Homepage of Brilish</title>
  <link rel="icon" href="/asdgod.github.io/favicon.ico">
  <!-- Font Awesome 6 (free icons) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* ----- base & theme variables ----- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
	
    .main-purp-grad {
      background: linear-gradient(to bottom, #D890EC, #7030A0);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    body {
      --bg-primary: #f8fafc;
      --bg-secondary: #ffffff;
      --bg-sidebar: #f1f5f9;
      --text-primary: #0f172a;
      --text-secondary: #334155;
      --border-light: #e2e8f0;
      --icon-color: #475569;
      --hover-bg: #e2e8f0;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.05), 0 2px 4px -2px rgb(0 0 0 / 0.05);
      transition: background-color 0.2s ease, color 0.2s ease;
    }

    body.dark {
      --bg-primary: #0b1120;
      --bg-secondary: #1e293b;
      --bg-sidebar: #111827;
      --text-primary: #f1f5f9;
      --text-secondary: #cbd5e1;
      --border-light: #334155;
      --icon-color: #94a3b8;
      --hover-bg: #1e293b;
      --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.5), 0 2px 4px -2px rgb(0 0 0 / 0.5);
    }

    body {
      background-color: var(--bg-primary);
      color: var(--text-primary);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* top bar */
    .top-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.75rem 1.5rem;
      background-color: var(--bg-secondary);
      border-bottom: 1px solid var(--border-light);
      box-shadow: var(--shadow);
    }

    .site-title {
      font-weight: 500;
      font-size: 1.2rem;
      letter-spacing: -0.01em;
      color: var(--text-primary);
    }
    .site-title i {
      color: var(--icon-color);
      margin-right: 0.5rem;
    }

    .theme-btn {
      background: none;
      border: none;
      font-size: 1.3rem;
      cursor: pointer;
      color: var(--icon-color);
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 9999px;
      background-color: var(--bg-primary);
      transition: 0.15s;
    }
    .theme-btn:hover {
      background-color: var(--hover-bg);
      color: var(--text-primary);
    }

    /* main container (flex) */
    .app-container {
      display: flex;
      flex: 1;
      min-height: calc(100vh - 61px);
    }

    /* --- SIDEBAR (retractable) --- */
    .sidebar {
      width: 220px;
      background-color: var(--bg-sidebar);
      border-right: 1px solid var(--border-light);
      transition: width 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      overflow-x: hidden;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow);
    }

    .sidebar.collapsed {
      width: 68px;
    }

    .sidebar-header {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      padding: 1rem 0.75rem;
      border-bottom: 1px solid var(--border-light);
      margin-bottom: 1.5rem;
    }

    .collapse-toggle {
      background: none;
      border: none;
      color: var(--icon-color);
      font-size: 1.2rem;
      cursor: pointer;
      width: 2.2rem;
      height: 2.2rem;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: 0.5rem;
      background-color: var(--bg-secondary);
      transition: 0.15s;
    }
    .collapse-toggle:hover {
      background-color: var(--hover-bg);
      color: var(--text-primary);
    }

    .sidebar-nav {
      display: flex;
      flex-direction: column;
      gap: 0.5rem;
      padding: 0 0.5rem;
    }

    /* base link style */
    .sidebar-nav a {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.7rem 0.8rem;
      border-radius: 0.6rem;
      text-decoration: none;
      color: var(--text-secondary);
      font-weight: 450;
      white-space: nowrap;
      transition: background 0.1s, color 0.1s;
    }

    .sidebar-nav a:hover {
      background-color: var(--hover-bg);
      color: var(--text-primary);
    }

    .sidebar-nav a i {
      font-size: 1.2rem;
      width: 1.6rem;
      text-align: center;
      color: var(--icon-color);
    }

    /* --- dropdown groups --- */
    .sidebar-group {
      display: flex;
      flex-direction: column;
    }

    .sidebar-group-header {
      background: none;
      border: none;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0.7rem 0.8rem;
      color: var(--text-secondary);
      font-weight: 450;
      cursor: pointer;
      border-radius: 0.6rem;
      transition: background 0.1s;
      font-size: inherit;
      font-family: inherit;
    }

    .sidebar-group-header:hover {
      background-color: var(--hover-bg);
      color: var(--text-primary);
    }

    .sidebar-group-header .group-arrow {
      font-size: 0.9rem;
      color: var(--icon-color);
      transition: transform 0.2s;
    }

    .sidebar-group-content {
      display: block;
      padding-left: 0.5rem; /* indent nested links */
    }

    .sidebar-group-content a {
      padding-left: 1.5rem; /* extra indent for nested links */
    }

    /* collapsed sidebar: hide group headers, reset nested links to icon-only */
    .sidebar.collapsed .sidebar-group-header {
      display: none;
    }

    .sidebar.collapsed .sidebar-group-content {
      display: block !important; /* keep visible */
      padding-left: 0;
    }

    .sidebar.collapsed .sidebar-group-content a {
      padding-left: 0;
      justify-content: center;
    }

    .sidebar.collapsed .sidebar-group-content a span {
      display: none;
    }

    .sidebar.collapsed .sidebar-group-content a i {
      margin: 0;
      width: auto;
      font-size: 1.3rem;
    }

    /* collapsed sidebar: standalone links also become icon-only */
    .sidebar.collapsed .sidebar-nav > a span {
      display: none;
    }

    .sidebar.collapsed .sidebar-nav > a {
      justify-content: center;
      padding: 0.7rem 0;
    }

    .sidebar.collapsed .sidebar-nav > a i {
      margin: 0;
      width: auto;
      font-size: 1.3rem;
    }

    /* --- main content (placeholder + iframe) --- */
    .main-content {
      flex: 1;
      background-color: var(--bg-primary);
      padding: 2.5rem 1.5rem;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--text-secondary);
      font-size: 1.2rem;
      text-align: center;
      position: relative;
    }

    .placeholder {
      max-width: 500px;
      padding: 1.5rem;
      border-radius: 1.5rem;
      background-color: var(--bg-secondary);
      box-shadow: var(--shadow);
      border: 1px solid var(--border-light);
      transition: box-shadow 0.2s;
    }

    .main-content i.fa-infinity {
      font-size: 3rem;
      color: var(--icon-color);
      margin-bottom: 1rem;
      opacity: 0.7;
      cursor: pointer;
    }

    .main-content p {
      line-height: 1.6;
    }

    #toolFrame {
      width: 100%;
      height: 100%;
      border: none;
      position: absolute;
      top: 0;
      left: 0;
      background: var(--bg-primary);
    }

    /* ----- EASTER EGG (infinity click) ----- */
    .placeholder.egg {
      animation: expandPlaceholder 1s ease-in-out forwards;
    }

    .placeholder.egg .fa-infinity {
      animation: spinEnlarge 1s ease-in-out forwards;
    }

    @keyframes expandPlaceholder {
      0% { transform: scale(1); }
      20% { transform: scale(1.2); }
      80% { transform: scale(1.2); }
      100% { transform: scale(1); }
    }

    @keyframes spinEnlarge {
      0% { transform: scale(1) rotate(0deg); }
      20% { transform: scale(1.5) rotate(0deg); }
      50% { transform: scale(1.5) rotate(180deg); }
      80% { transform: scale(1.5) rotate(360deg); }
      100% { transform: scale(1) rotate(360deg); }
    }

    /* tiny responsive touch */
    @media (max-width: 500px) {
      .sidebar {
        position: absolute;
        z-index: 10;
        height: 100%;
      }
      .app-container {
        position: relative;
      }
      .main-content {
        margin-left: 68px;
      }
      .sidebar.collapsed {
        width: 68px;
      }
      .sidebar:not(.collapsed) {
        width: 220px;
      }
    }
  </style>
</head>
<body class="dark">
  <!-- top bar with theme toggle -->
  <header class="top-bar">
    <div class="site-title">
      <i class="fa-regular fa-copyright"></i> Brilish - Asds association
    </div>
    <button class="theme-btn" id="themeToggle" aria-label="Toggle dark mode">
      <i class="fas fa-sun" id="themeIcon"></i>
    </button>
  </header>

  <!-- main area: sidebar + content -->
  <div class="app-container">
    <!-- left sidebar with dropdown groups -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <button class="collapse-toggle" id="sidebarToggle" aria-label="Toggle sidebar">
          <i class="fas fa-chevron-left" id="toggleIcon"></i>
        </button>
      </div>
      <nav class="sidebar-nav">
        <!-- Group: Cipher -->
        <div class="sidebar-group">
          <button class="sidebar-group-header" data-target="cipher-group">
            <span>Cipher</span>
            <i class="fas fa-chevron-down group-arrow"></i>
          </button>
          <div class="sidebar-group-content" id="cipher-group">
            <a href="vigenere.html" target="tool-frame" title="Vigenère table">
              <i class="fas fa-table"></i>
              <span>Vigenère</span>
            </a>
            <a href="enigma.html" target="tool-frame" title="Enigma machine">
              <i class="fas fa-cogs"></i>
              <span>Enigma</span>
            </a>
          </div>
        </div>
        <!-- Group: Apps -->
        <div class="sidebar-group">
          <button class="sidebar-group-header" data-target="apps-group">
            <span>Apps</span>
            <i class="fas fa-chevron-down group-arrow"></i>
          </button>
          <div class="sidebar-group-content" id="apps-group">
            <a href="rarity.html" target="tool-frame" title="Rarity calculator">
              <i class="fas fa-dice-d6"></i>
              <span>Rarity calculator</span>
            </a>
            <a href="issues.html" target="tool-frame" title="Issues writer">
              <i class="fas fa-pen-to-square"></i>
              <span>Issues writer</span>
            </a>
          </div>
        </div>
        <!-- Group: Event -->
        <div class="sidebar-group">
          <button class="sidebar-group-header" data-target="event-group">
            <span>Event</span>
            <i class="fas fa-chevron-down group-arrow"></i>
          </button>
          <div class="sidebar-group-content" id="event-group">
            <a href="kakuro.html" target="tool-frame" title="Kakuro solver">
              <i class="fa-brands fa-flipboard"></i>
              <span>Kakuro solver</span>
            </a>
          </div>
        </div>
        <!-- Standalone: Scripts -->
        <a href="https://github.com/PrestonPhuong/scripts-violent" title="scripts">
          <i class="fa-solid fa-scroll"></i>
          <span>Scripts</span>
        </a>
      </nav>
    </aside>

    <!-- main screen: placeholder (visible initially) + iframe (hidden initially) -->
    <main class="main-content">
      <div class="placeholder" id="eggPlaceholder">
        <i class="fa-solid fa-infinity main-purp-grad" id="infinityIcon"></i>
        <p><strong>The briliancy of Preston</strong><br> <span style="font-size: 1rem; opacity:0.7;">The greatest of today</span></p>
      </div>
      <iframe name="tool-frame" id="toolFrame" style="display: none;"></iframe>
    </main>
  </div>

  <script src="mainjs.js"></script>
</body>
</html>
