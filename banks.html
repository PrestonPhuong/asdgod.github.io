<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bank of Brilish - Headquarter </title>
  <!-- Font Awesome 6 (free) -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: #0c0c0f;
      background-image: radial-gradient(circle at 15% 30%, #1f1f2a 0%, #0a0a0c 90%);
      min-height: 100vh;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      color: #f0f0f0;
    }

    h1 {
      font-weight: 400;
      font-size: 2.2rem;
      letter-spacing: 1px;
      margin-bottom: 1rem;
      text-shadow: 0 2px 5px rgba(0,0,0,0.6);
      border-bottom: 1px solid #2c2c3a;
      padding-bottom: 0.5rem;
      display: inline-block;
    }

    h1 i {
      color: #b0a0ff;
      font-size: 2rem;
      margin-right: 10px;
    }

    /* card grid – responsive grid, fills full width */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr)); /* wider min to fit big icons */
      gap: 2.5rem 2rem;
      width: 100%;
      max-width: 1600px;        /* allow extra width for huge icons */
      margin: 1.5rem auto 0;
      justify-items: center;
      align-items: end;
    }

    /* individual account card – no background, border, padding */
    .account-card {
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      text-align: center;
      transition: transform 0.2s ease;
      width: 100%;
    }

    .account-card:hover {
      transform: translateY(-6px);
    }

    /* mastercard icon  */
    .account-card i {
      font-size: clamp(9rem, 15vw, 13rem);  
      filter: drop-shadow(0 12px 20px #00000080);
      transition: transform 0.2s;
      line-height: 1;
    }

    .account-card:hover i {
      transform: scale(1.02);
    }

    /* container for money and name – flex column */
    .account-info {
      display: flex;
      flex-direction: column;
      align-items: center;
      margin-top: 0.3rem;
    }

    .account-name {
      font-size: 1.3rem;
      font-weight: 500;
      line-height: 1.4;
      color: #ffffff;
      text-shadow: 0 2px 3px black;
    }

    .account-money {
      font-size: 1.5rem;
      font-weight: 400;
      color: #b9f3b0;
      letter-spacing: 0.5px;
    }

    /* ----- overlay (grey, 30% transparent) ----- */
    .overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background-color: rgba(100, 100, 115, 0.3);
      backdrop-filter: blur(3px);
      -webkit-backdrop-filter: blur(3px);
      display: flex;
      align-items: center;
      justify-content: center;
      visibility: hidden;
      opacity: 0;
      transition: opacity 0.2s ease, visibility 0.2s;
      z-index: 1000;
    }

    .overlay.active {
      visibility: visible;
      opacity: 1;
    }

    .detail-panel {
      background: #18181e;
      color: #f0eaff;
      width: 340px;
      max-width: 90%;
      padding: 2rem 2rem 1.8rem;
      border-radius: 32px;
      border: 1px solid #56566e;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.7), 0 0 0 1px #80808040 inset;
      text-align: left;
    }

    .detail-panel h3 {
      font-size: 1.8rem;
      font-weight: 350;
      margin-bottom: 1.6rem;
      border-left: 5px solid #a0a0ff;
      padding-left: 1rem;
      color: #d6d6ff;
    }

    .detail-row {
      font-size: 1.2rem;
      padding: 0.6rem 0;
      border-bottom: 1px dashed #3f3f55;
      display: flex;
      align-items: baseline;
    }

    .detail-label {
      width: 110px;
      font-weight: 300;
      color: #b1b1cf;
    }

    .detail-value {
      font-weight: 500;
      color: white;
      word-break: break-word;
    }

    .close-btn {
      margin-top: 2rem;
      text-align: right;
    }

    .close-btn button {
      background: #2c2c40;
      border: 1px solid #6d6d9f;
      color: white;
      font-size: 1.1rem;
      padding: 0.5rem 2rem;
      border-radius: 50px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.15s;
      letter-spacing: 0.5px;
    }

    .close-btn button:hover {
      background: #40405c;
      border-color: #a7a7ff;
      transform: scale(0.97);
    }

    /* remove white wash – let mastercard colors shine */
    .fa-cc-mastercard {
      color: inherit; 
    }

    /* adjust for smaller screens */
    @media (max-width: 600px) {
      h1 {
        font-size: 1.8rem;
      }
      .card-grid {
        gap: 1.5rem 1rem;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); /* smaller min on narrow screens */
      }
      .account-card i {
        font-size: clamp(6rem, 12vw, 9rem); /* slightly reduced but still huge */
      }
    }
  </style>
</head>
<body>
  <h1>
    <i class="fa-regular fa-building"></i> 
    Bank of Brilish
  </h1>

  <!-- container for dynamically generated cards -->
  <div class="card-grid" id="accountContainer"></div>

  <!-- overlay -->
  <div class="overlay" id="detailsOverlay">
    <div class="detail-panel">
      <h3><i class="fa-regular fa-credit-card" style="margin-right: 8px;"></i>account data</h3>
      <div class="detail-row">
        <span class="detail-label"><i class="fa-regular fa-id-card" style="width: 24px;"></i> ID</span>
        <span class="detail-value" id="detailId">---</span>
      </div>
      <div class="detail-row">
        <span class="detail-label"><i class="fa-regular fa-calendar"></i> opened</span>
        <span class="detail-value" id="detailDate">---</span>
      </div>
      <div class="close-btn">
        <button id="closeOverlayBtn"><i class="fa-regular fa-circle-xmark" style="margin-right: 6px;"></i>close</button>
      </div>
    </div>
  </div>

  <script>
    (function() {
      const accounts = [
        { name: 'Brilish',     id: 'ADMN',  date: '2026-03-12', money: 0.00 },
		{ name: 'Aerilia',     id: 'AERL',  date: '2026-03-14', money: 0.675 },	
        { name: 'BorkMaster',     id: 'BORK',  date: '2026-03-12', money: 0.00 },		
      ];

      const container = document.getElementById('accountContainer');
      const overlay = document.getElementById('detailsOverlay');
      const detailIdSpan = document.getElementById('detailId');
      const detailDateSpan = document.getElementById('detailDate');
      const closeBtn = document.getElementById('closeOverlayBtn');

      accounts.forEach(acc => {
        const card = document.createElement('div');
        card.className = 'account-card';
        card.dataset.accountId = acc.id;
        card.dataset.accountDate = acc.date;

        const icon = document.createElement('i');
        icon.className = 'fa-brands fa-cc-mastercard';
        card.appendChild(icon);

        const infoDiv = document.createElement('div');
        infoDiv.className = 'account-info';

        const moneyDiv = document.createElement('div');
        moneyDiv.className = 'account-money';
        moneyDiv.textContent = ` ${acc.money.toFixed(2)}`;

        const nameDiv = document.createElement('div');
        nameDiv.className = 'account-name';
        nameDiv.textContent = acc.name;

        infoDiv.appendChild(moneyDiv);
        infoDiv.appendChild(nameDiv);
        card.appendChild(infoDiv);

        card.addEventListener('click', () => {
          detailIdSpan.textContent = card.dataset.accountId;
          detailDateSpan.textContent = card.dataset.accountDate;
          overlay.classList.add('active');
        });

        container.appendChild(card);
      });

      closeBtn.addEventListener('click', () => {
        overlay.classList.remove('active');
      });

      overlay.addEventListener('click', (e) => {
        if (e.target === overlay) {
          overlay.classList.remove('active');
        }
      });

      document.addEventListener('keydown', (e) => {
        if (e.key === 'Escape' && overlay.classList.contains('active')) {
          overlay.classList.remove('active');
        }
      });
    })();
  </script>

  <div style="margin-top: 3rem; font-size: 0.9rem; opacity: 0.5; display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;">
    <span> In Brilish We Trust </span>
  </div>
</body>
</html>
